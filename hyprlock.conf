$color = rgba(7, 25, 35, 1.0)
$inner_color = rgba(7, 25, 35, 0.8)
$outer_color = rgba(65, 105, 124, 1.0)
$font_color = rgba(216, 209, 195, 1.0)
$check_color = rgba(234, 223, 202, 1.0)

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter, Sir
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 16
    shadow_passes = 0
    fade_on_empty = false
}